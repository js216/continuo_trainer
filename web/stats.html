<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continuo Trainer — Stats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1e2030; color: #d0d0d0;
  font-family: monospace; font-size: 13px;
  padding: 10px 14px;
}
h3 { color: #888; font-size: 12px; font-weight: normal;
     letter-spacing: 1px; text-transform: uppercase;
     margin: 10px 0 4px; border-bottom: 1px solid #2a2d40; padding-bottom: 3px; }
button {
  background: #2a2d40; color: #d0d0d0;
  border: 1px solid #3a3d55; padding: 3px 9px;
  cursor: pointer; font-family: monospace; font-size: 12px; border-radius: 2px;
}
button:hover { background: #353850; }
button.primary { background: #1a5040; border-color: #2a7060; }
button.primary:hover { background: #226050; }

/* ── report ── */
#report {
  white-space: pre; font-size: 12px; line-height: 1.55;
  color: #c8c8c8; margin-top: 4px;
  padding-top: 8px; border-top: 1px solid #2a2d40;
  overflow-x: auto;
}
</style>
</head>
<body>

<div class="btn-row">
  <button onclick="renderReport()">Refresh</button>
</div>
<div id="report"></div>

<script>
// ── constants / storage ───────────────────────────────────────────────────────
const STATS_KEY = "continuo_stats";

function loadStats() {
    let d = {};
    try { const r = localStorage.getItem(STATS_KEY); if (r) d = JSON.parse(r); } catch(_) {}
    d.algorithm = d.algorithm || {};
    d.daily     = d.daily     || {};
    d.chunks    = d.chunks    || {};
    return d;
}
function saveData(d) { try { localStorage.setItem(STATS_KEY, JSON.stringify(d)); } catch(_) {} }

// ── report helpers ────────────────────────────────────────────────────────────
const L = (s,n) => String(s).padStart(n);
const R = (s,n) => String(s).padEnd(n);

function normalize(raw, e) { const mg=e.max_groups||0; return mg>0?(raw/(mg*5))*100:0; }

function daysElapsed(ds) {
    if (!ds) return null;
    const [y,m,d] = ds.split("-").map(Number);
    return Math.max(0, Math.floor((Date.now()-Date.UTC(y,m-1,d,12))/86400000));
}

function calcPower(e, alg) {
    const mastery = Math.max(e.mastery||0, e.t_mastery||0);
    const ivl = e.ivl||0;
    let eff = e.last_date, t = e.t_last_date;
    if (t && (!eff||t>eff)) eff = t;
    if (!eff||ivl<=0) return 0;
    const days = daysElapsed(eff)||0;
    return Math.min(mastery, mastery*Math.exp(-(alg.power_half_life||0.693)*days/ivl));
}

function calcStreak(data) {
    const goal = data.algorithm.score_goal||1000;
    const today = new Date().toISOString().slice(0,10);
    let streak=0, ts=Date.now();
    for(;;) {
        const ds = new Date(ts).toISOString().slice(0,10);
        if ((data.daily[ds]||{}).score >= goal) { streak++; ts-=86400000; }
        else if (ds===today && streak===0) ts-=86400000;
        else break;
    }
    return streak;
}

function fmtDur(s) {
    if (!s||s<=0) return "--";
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
    if (h>0) return `${h}h${String(m).padStart(2,"0")}m`;
    if (m>0) return `${m}m${String(sec).padStart(2,"0")}s`;
    return `${sec}s`;
}

function barStr(frac, w) {
    const f = Math.max(0,Math.min(w,Math.round((frac||0)*w)));
    return "#".repeat(f)+".".repeat(w-f);
}

function pctStr(n, w=3) { return L(Math.round(n), w)+"%"; }   // " 87%"
function p1Str(n, w=6)  { return L(n.toFixed(1), w)+"%"; }    // "  12.3%"

// ── report ────────────────────────────────────────────────────────────────────
function renderReport() {
    const data  = loadStats();
    const alg   = data.algorithm;
    const chunks = data.chunks;
    const today = new Date().toISOString().slice(0,10);
    const tod   = data.daily[today]||{score:0,duration:0};
    const streak = calcStreak(data);
    const goal   = alg.score_goal||1000;
    const score  = tod.score||0;
    const gFrac  = Math.min(1, score/goal);
    const lines  = [];

    lines.push(`=== Continuo Trainer  ${today} ===`);
    lines.push(`Today   score ${L(score.toFixed(1),7)} / ${R(Math.floor(goal),6)} `
             + `[${barStr(gFrac,10)}] ${L(Math.floor(gFrac*100),3)}%`
             + `  time ${R(fmtDur(tod.duration||0),8)}  streak: ${streak} day${streak===1?"":"s"}`);
    let totSecs=0, nC=0;
    for (const c of Object.values(chunks)) { totSecs+=c.total_duration||0; nC++; }
    lines.push(`Total   chunks: ${nC}   practice time: ${fmtDur(totSecs)}`);

    // ── skills ──
    const ss = {};
    for (const [h,c] of Object.entries(chunks)) {
        if (!c.skills) continue;
        const mp = normalize(c.mastery||0, c), pp = normalize(calcPower(c,alg), c);
        const prac = ((c.n_pass_tot||0)+(c.n_fail_tot||0))>0;
        for (const sk of c.skills.split(/\s+/).filter(Boolean)) {
            if (!ss[sk]) ss[sk]={n:0,np:0,mS:0,pS:0,pass:0,fail:0,eS:0,eN:0,easS:0,easN:0,bS:0,bN:0,dur:0};
            const s=ss[sk]; s.n++; s.mS+=mp; s.pS+=pp;
            s.pass+=c.n_pass_tot||0; s.fail+=c.n_fail_tot||0;
            s.dur+=c.total_duration||0; if(prac)s.np++;
            if(c.ema_pass!==undefined){s.eS+=c.ema_pass;s.eN++;}
            if(c.ease!==undefined){s.easS+=c.ease;s.easN++;}
            if(c.best_avg!==undefined){s.bS+=c.best_avg;s.bN++;}
        }
    }
    const skOrder={};let skN=0;
    for(const sk of (alg.skill_order||"").split(/\s+/).filter(Boolean)) skOrder[sk]=skN++;
    const skNames = Object.keys(ss).sort((a,b)=>{
        const ra=skOrder[a]??skN, rb=skOrder[b]??skN;
        return ra!==rb?ra-rb:a<b?-1:1;
    });

    if (skNames.length>0) {
        lines.push("");
        lines.push(`SKILLS (${skNames.length})`);
        lines.push("  Chunks: practiced/total.  Mastery/Power: avg % across chunks.");
        lines.push("  Rate: pass/(pass+fail).  EMA: avg smoothed pass rate.");
        lines.push("");
        lines.push("  "+R("Skill",10)+"  "+L("Chunks",11)+"  "+R("Mastery",7)
                  +"  "+R("Power",7)+"  "+L("Pass",5)+"  "+L("Fail",5)
                  +"  "+L("Rate",5)+"  "+L("EMA",5)+"  "+L("Ease",5)
                  +"  "+L("Speed",6)+"  "+L("Time",8));
        lines.push("-".repeat(97));
        for (const sn of skNames) {
            const s=ss[sn], tot=s.pass+s.fail;
            const rate = tot>0 ? pctStr(s.pass/tot*100) : "  --";
            const ema  = s.eN>0 ? pctStr(s.eS/s.eN*100) : "  --";
            const ease = s.easN>0 ? (s.easS/s.easN).toFixed(2) : "  --";
            const spd  = s.bN>0 ? L((s.bS/s.bN).toFixed(3)+"s",6) : "    --";
            lines.push("  "+R(sn,10)
                +"  "+L(s.np,5)+"/"+R(s.n,5)
                +"  "+p1Str(s.mS/s.n)+"  "+p1Str(s.pS/s.n)
                +"  "+L(s.pass,5)+"  "+L(s.fail,5)
                +"  "+L(rate,5)+"  "+L(ema,5)+"  "+L(ease,5)
                +"  "+spd+"  "+L(fmtDur(s.dur),8));
        }
    }

    // ── chunks ──
    const eWin = alg.ema_alpha ? `~${Math.round(1/alg.ema_alpha)}` : "?";
    const hashes = Object.keys(chunks).sort((a,b)=>{
        const la=chunks[a].level||0, lb=chunks[b].level||0;
        if (la!==lb) return la-lb;
        return normalize(chunks[a].mastery||0,chunks[a])-normalize(chunks[b].mastery||0,chunks[b]);
    });

    if (hashes.length>0) {
        lines.push("");
        lines.push(`CHUNKS (${hashes.length})`);
        lines.push("");
        lines.push("  Column legend:");
        lines.push("    Hash     First 8 hex chars of the SHA-1 ID");
        lines.push("    L        Level: 0=full lesson, 1=3-bar drill, 2=1-bar drill");
        lines.push("    Dir%     Direct mastery: scored from sessions on this chunk");
        lines.push("    Trn%     Transitive mastery: inferred from practice of parent chunks");
        lines.push("    Power    Retention: mastery decayed by time elapsed vs review interval");
        lines.push("    Pass/Fail  Total all-correct / sessions-with-error");
        lines.push("    Rate     Pass / (Pass+Fail)");
        lines.push(`    EMA      Smoothed pass rate (${eWin}-session window, α=${alg.ema_alpha??"?"})`);
        lines.push(`    Ease     SRS multiplier (init=${(alg.ease_initial||2.5).toFixed(1)}, `
                  +`min=${(alg.ease_min||1.3).toFixed(1)}, max=${(alg.ease_max||3.5).toFixed(1)})`);
        lines.push("    Ivl      SRS review interval in days (* = review overdue)");
        lines.push("    BPM      Tempo EMA in beats per minute");
        lines.push("    BestAvg  Fastest recorded average inter-note transition time");
        lines.push("    PFac     Power factor: penalty for failed sub-ranges (100%=clean)");
        lines.push("    Last     Date of most recent practice (direct or transitive)");
        lines.push("");
        lines.push("  "+R("Hash",8)+"  L"
                  +"  "+R("Dir%",7)+"  "+R("Trn%",7)+"  "+R("Power",7)
                  +"  "+L("Pass",5)+"  "+L("Fail",5)
                  +"  "+L("Rate",5)+"  "+L("EMA",5)+"  "+L("Ease",5)
                  +"  "+L("Ivl",5)+"  "+L("BPM",5)+"  "+L("BestAvg",7)
                  +"  "+L("PFac",5)+"  Last");
        lines.push("-".repeat(109));
        for (const h of hashes) {
            const c=chunks[h];
            const dir   = normalize(c.mastery||0, c);
            const trn   = normalize(c.t_mastery||0, c);
            const pow   = normalize(calcPower(c,alg), c);
            const ivl   = Math.floor(c.ivl||0);
            let eff=c.last_date, tl=c.t_last_date;
            if(tl&&(!eff||tl>eff)) eff=tl;
            const el    = daysElapsed(eff);
            const due   = ivl>0&&el!==null&&el>=ivl?"*":" ";
            const pass=c.n_pass_tot||0, fail=c.n_fail_tot||0, tot=pass+fail;
            const rate  = tot>0?pctStr(pass/tot*100):"  --";
            const ema   = c.ema_pass!==undefined?pctStr(c.ema_pass*100):"  --";
            const ease  = (c.ease||0).toFixed(2);
            const bpm   = c.ema_bpm!==undefined?L(Math.round(c.ema_bpm),5):"   --";
            const bavg  = c.best_avg!==undefined?L(c.best_avg.toFixed(3)+"s",7):"     --";
            const pfac  = c.power_factor!==undefined?pctStr(c.power_factor*100):"  --";
            lines.push("  "+R(h.slice(0,8),8)+"  "+(c.level||0)
                +"  "+p1Str(dir)+"  "+p1Str(trn)+"  "+p1Str(pow)
                +"  "+L(pass,5)+"  "+L(fail,5)
                +"  "+L(rate,5)+"  "+L(ema,5)+"  "+L(ease,5)
                +"  "+L(ivl,4)+due+"  "+bpm+"  "+bavg
                +"  "+L(pfac,5)+"  "+(eff||"--"));
        }
    }

    document.getElementById("report").textContent = lines.join("\n");
}

// ── init ──────────────────────────────────────────────────────────────────────
renderReport();
</script>
</body>
</html>
