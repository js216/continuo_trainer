<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continuo Trainer — Lessons</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1e2030; color: #d0d0d0;
  font-family: monospace; font-size: 12px;
  overflow-y: auto;
}

/* ── rows ── */
.skill-row, .chunk-row {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 6px; cursor: pointer; user-select: none;
  white-space: nowrap;
}
.skill-row:hover  { background: #252838; }
.chunk-row:hover  { background: #252838; }
.chunk-row.active { background: #1a3a25; }

.expander {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; font-size: 10px; color: #666; flex-shrink: 0;
}
.expander.has-children:hover { color: #aaa; }

.row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.skill-label {
  color: #aaa; font-weight: bold; font-size: 11px; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.chunk-label { color: #d0d0d0; }
.chunk-label.dim { color: #555; }

/* ── bars (same style as toolbar) ── */
.bar-track {
  width: 60px; height: 12px; flex-shrink: 0;
  background: #2a2d40; border-radius: 2px; overflow: hidden; position: relative;
}
.bar-fill {
  height: 100%; background: var(--color, #cc8022);
  border-radius: 2px;
}
.bar-val {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff; text-shadow: 0 0 2px #000;
  pointer-events: none;
}

/* ── tree structure ── */
.tree, .children { list-style: none; padding: 0; margin: 0; }
.children.collapsed { display: none; }
</style>
</head>
<body>
<ul id="tree" class="tree"></ul>

<script>
const STATS_KEY = "continuo_stats";

function loadStats() {
    let d = {};
    try { const r = localStorage.getItem(STATS_KEY); if (r) d = JSON.parse(r); } catch(_) {}
    d.algorithm = d.algorithm || {};
    d.daily     = d.daily     || {};
    d.chunks    = d.chunks    || {};
    return d;
}

function normalize(raw, c) {
    const mg = c.max_groups || 0;
    return mg > 0 ? (raw / (mg * 5)) * 100 : 0;
}

function daysElapsed(ds) {
    if (!ds) return null;
    const [y, m, d] = ds.split("-").map(Number);
    return Math.max(0, Math.floor((Date.now() - Date.UTC(y, m-1, d, 12)) / 86400000));
}

function calcPower(e, alg) {
    const mastery = Math.max(e.mastery || 0, e.t_mastery || 0);
    const ivl = e.ivl || 0;
    let eff = e.last_date, t = e.t_last_date;
    if (t && (!eff || t > eff)) eff = t;
    if (!eff || ivl <= 0) return 0;
    const days = daysElapsed(eff) || 0;
    return Math.min(mastery, mastery * Math.exp(-(alg.power_half_life || 0.693) * days / ivl));
}

function primarySkill(skillsStr, skillOrder) {
    const skills = (skillsStr || "").split(/\s+/).filter(Boolean);
    for (let i = skillOrder.length - 1; i >= 0; i--) {
        if (skills.includes(skillOrder[i])) return skillOrder[i];
    }
    return skills[0] || "other";
}

function countBars(txt) {
    const timeM = txt && txt.match(/^time:\s*(\d+)\/(\d+)/m);
    if (!timeM) return null;
    const numer = parseInt(timeM[1]), denom = parseInt(timeM[2]);
    const blM = txt.match(/bassline\s*=\s*\{([^}]*)\}/);
    if (!blM) return null;
    let beats = 0;
    for (const token of blM[1].trim().split(/\s+/).filter(Boolean)) {
        const durM = token.match(/\d+/);
        if (durM) beats += denom / parseInt(durM[0]);
    }
    return beats > 0 ? Math.max(1, Math.round(beats / numer)) : null;
}

function chunkLabel(txt, level) {
    const titleM = txt && txt.match(/^title:\s*(.+)/m);
    const barM   = txt && txt.match(/^bar:\s*(\d+)/m);
    const title  = titleM ? titleM[1].trim() : "(untitled)";
    const start  = barM ? parseInt(barM[1]) : 1;
    const n = countBars(txt);
    const barLabel = start === null ? null
        : n !== null && n > 1 ? `bars ${start}-${start + n - 1}` : `bar ${start}`;
    if (level === 0) return barLabel ? `${title} – ${barLabel}` : title;
    return barLabel || "(?)";
}

function makeBar(pct, thresh, title) {
    const color = pct >= thresh ? "#33cc55" : "#cc8022";
    const fill  = Math.min(100, Math.max(0, pct));
    const track = document.createElement("div");
    track.className = "bar-track";
    track.title = title;
    const f = document.createElement("div");
    f.className = "bar-fill";
    f.style.width = fill + "%";
    f.style.setProperty("--color", color);
    const lbl = document.createElement("div");
    lbl.className = "bar-val";
    lbl.textContent = Math.round(fill) + "%";
    track.appendChild(f);
    track.appendChild(lbl);
    return track;
}

// ── expand state (persists across re-renders) ─────────────────────────────────

const expanded = new Set();
let _initialized = false;

function toggleExpand(key) {
    if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
}

// ── render ────────────────────────────────────────────────────────────────────

function renderReport() {
    const idx    = (window.parent && window.parent.CHN_INDEX) || {};
    const data   = loadStats();
    const alg    = data.algorithm;
    const chunks = data.chunks;
    const skillOrder = (alg.skill_order || "root 6 4-3_sus 6/4 7 other")
                        .split(/\s+/).filter(Boolean);
    const mThresh = alg.chunk_mastery_thresh || 80;
    const pThresh = alg.chunk_power_thresh   || 70;
    const activeHash = window.parent && window.parent.state
                       ? window.parent.state.currentChunk : null;

    // Group level-0 chunks by primary skill
    const bySkill = {};
    for (const [hash, c] of Object.entries(idx)) {
        if (c.level !== 0) continue;
        const sk = primarySkill(c.skills, skillOrder);
        if (!bySkill[sk]) bySkill[sk] = [];
        bySkill[sk].push(hash);
    }

    const skills = Object.keys(bySkill).sort((a, b) => {
        const ra = skillOrder.indexOf(a), rb = skillOrder.indexOf(b);
        return (ra < 0 ? 999 : ra) - (rb < 0 ? 999 : rb) || (a < b ? -1 : 1);
    });

    // On first load, expand all skill groups
    if (!_initialized) {
        for (const sk of skills) expanded.add(`sk:${sk}`);
        _initialized = true;
    }

    const treeEl = document.getElementById("tree");
    treeEl.innerHTML = "";

    for (const sk of skills) {
        const skKey = `sk:${sk}`;
        const isExp = expanded.has(skKey);

        const li  = document.createElement("li");
        const row = document.createElement("div");
        row.className = "skill-row";

        const exp = document.createElement("span");
        exp.className = "expander has-children";
        exp.textContent = isExp ? "▾" : "▸";

        const name = document.createElement("span");
        name.className = "row-name";
        const label = document.createElement("span");
        label.className = "skill-label";
        label.textContent = sk;
        name.appendChild(label);

        row.appendChild(exp);
        row.appendChild(name);
        row.addEventListener("click", () => { toggleExpand(skKey); renderReport(); });

        li.appendChild(row);

        if (isExp) {
            // Sort level-0 chunks low mastery first
            const l0s = bySkill[sk].slice().sort((a, b) => {
                const ca = chunks[a] || {}, cb = chunks[b] || {};
                return normalize(Math.max(ca.mastery||0, ca.t_mastery||0), ca)
                     - normalize(Math.max(cb.mastery||0, cb.t_mastery||0), cb);
            });
            const cl = document.createElement("ul");
            cl.className = "children";
            for (const h of l0s) cl.appendChild(mkChunkLi(h, idx, chunks, alg, mThresh, pThresh, activeHash, 1));
            li.appendChild(cl);
        }

        treeEl.appendChild(li);
    }
}

function mkChunkLi(hash, idx, chunks, alg, mThresh, pThresh, activeHash, depth) {
    const c      = idx[hash] || {};
    const stat   = chunks[hash] || {};
    const ever   = (stat.mastery || 0) > 0 || (stat.t_mastery || 0) > 0 || (stat.n_pass_tot || 0) > 0;
    const mastery = normalize(Math.max(stat.mastery || 0, stat.t_mastery || 0), stat);
    const power   = normalize(calcPower(stat, alg), stat);

    const key    = `ch:${hash}`;
    const isExp  = expanded.has(key);
    const hasCh  = c.children && c.children.length > 0;

    const li  = document.createElement("li");
    const row = document.createElement("div");
    const indentClass = depth > 1 ? ` style="padding-left:${6 + (depth-1)*14}px"` : "";
    row.className = "chunk-row" + (hash === activeHash ? " active" : "");
    if (depth > 1) row.style.paddingLeft = (6 + (depth - 1) * 14) + "px";

    const exp = document.createElement("span");
    exp.className = "expander" + (hasCh ? " has-children" : "");
    exp.textContent = hasCh ? (isExp ? "▾" : "▸") : "";

    const name = document.createElement("span");
    name.className = "row-name";
    const label = document.createElement("span");
    label.className = "chunk-label" + (ever ? "" : " dim");
    label.textContent = chunkLabel(c.txt, c.level);
    name.appendChild(label);

    row.appendChild(exp);
    row.appendChild(name);
    row.appendChild(makeBar(mastery, mThresh, `Mastery: ${mastery.toFixed(1)}%`));
    row.appendChild(makeBar(power,   pThresh, `Power: ${power.toFixed(1)}%`));

    if (hasCh) {
        exp.addEventListener("click", e => {
            e.stopPropagation();
            toggleExpand(key);
            renderReport();
        });
    }

    row.addEventListener("click", () => {
        if (window.parent && window.parent.loadChunk) window.parent.loadChunk(hash);
    });

    li.appendChild(row);

    if (isExp && hasCh) {
        const cl = document.createElement("ul");
        cl.className = "children";
        for (const ch of c.children)
            cl.appendChild(mkChunkLi(ch.hash, idx, chunks, alg, mThresh, pThresh, activeHash, depth + 1));
        li.appendChild(cl);
    }

    return li;
}

// ── init ──────────────────────────────────────────────────────────────────────
renderReport();
window.addEventListener("storage", e => { if (e.key === STATS_KEY) renderReport(); });
</script>
</body>
</html>
