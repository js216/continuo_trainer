<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continuo Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1e2030;
  color: #d0d0d0;
  font-family: monospace;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: #151825;
  border-bottom: 1px solid #2a2d40;
  flex-shrink: 0;
}

/* Progress bars */
.bar-wrap {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.bar-label { font-size: 10px; color: #aaa; }
.bar-track {
  width: 70px; height: 14px;
  background: #2a2d40;
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  background: var(--color, #3366cc);
  border-radius: 2px;
  transition: width 0.3s, background 0.3s;
}
.bar-track-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  text-shadow: 0 0 3px #000;
  pointer-events: none;
}

#streak-text { font-size: 12px; color: #00ff66; margin-left: 4px; }

/* Controls (right side) */
#controls {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
}

button {
  background: #2a2d40;
  color: #d0d0d0;
  border: 1px solid #3a3d55;
  padding: 3px 8px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
  border-radius: 2px;
}
button:hover  { background: #353850; }
button.active { background: #1a7040; border-color: #2a9050; }

#bpm-ctrl { display: flex; align-items: center; gap: 2px; }
#bpm-val {
  width: 46px;
  background: #12141e;
  color: #d0d0d0;
  border: 1px solid #3a3d55;
  padding: 3px 4px;
  text-align: center;
  font-family: monospace;
  font-size: 12px;
  border-radius: 2px;
  /* hide number spinner arrows */
  -moz-appearance: textfield;
}
#bpm-val::-webkit-outer-spin-button,
#bpm-val::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── workspace: left pane + divider + right pane ── */
#workspace {
  flex: 1;
  display: flex;
  flex-direction: row;
  overflow: hidden;
}

/* ── left pane ── */
#left-pane {
  flex: 1;
  min-width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  padding: 8px;
}

#score-img { display: none; max-width: 100%; }

/* ── squares ── */
#squares {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  margin: 6px 0;
  max-width: 100%;
}
.sq {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 20px;
  padding: 0 3px;
  font-size: 11px;
  border-radius: 2px;
  font-family: monospace;
}
.sq-ok   { background: #00dc50; color: #000; }
.sq-fail { background: #dc3232; color: #fff; }
.sq-done { background: #3232dc; color: #fff; }

/* ── explanations ── */
#explanations {
  font-size: 11px;
  color: #ff8080;
  white-space: pre;
  margin: 2px 0;
  align-self: flex-start;
}

/* ── score wrapper (for relative-positioned celebration) ── */
#score-wrap {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  flex-shrink: 0;
}

/* ── celebration overlay ── */
#celebration {
  position: absolute;
  right: 2rem;
  top: 50%;
  font-size: 52px;
  font-weight: bold;
  text-shadow: 2px 2px 0 #000;
  pointer-events: none;
  display: none;
  white-space: nowrap;
}

/* ── draggable divider ── */
#divider {
  width: 5px;
  flex-shrink: 0;
  background: #2a2d40;
  cursor: col-resize;
  display: none;
}
#divider:hover, #divider.dragging { background: #4a5070; }

/* ── right pane ── */
#right-pane {
  flex: 1;
  min-width: 80px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#right-pane.open { display: flex; }

/* ── tab bar ── */
#right-tab-bar {
  display: flex;
  align-items: stretch;
  background: #151825;
  border-bottom: 1px solid #2a2d40;
  flex-shrink: 0;
  font-size: 11px;
}
.rtab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  cursor: pointer;
  color: #777;
  border-right: 1px solid #2a2d40;
  user-select: none;
}
.rtab:hover { color: #aaa; background: #1a1d2e; }
.rtab.active { color: #d0d0d0; background: #1e2030; }
.rtab button {
  padding: 0 3px;
  font-size: 11px;
  line-height: 1;
  background: none;
  border: none;
  color: #555;
}
.rtab button:hover { color: #cc4444; background: none; }

/* ── right pane content areas ── */
#events-content {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
#events-content.active { display: flex; }

#events-log {
  flex: 1;
  overflow-y: auto;
  padding: 3px 5px;
  font-size: 10px;
  font-family: monospace;
  line-height: 1.4;
}
.ev-on   { color: #88ff88; }
.ev-off  { color: #446644; }
.ev-bpm  { color: #ffcc44; }
.ev-stat { color: #6688cc; }
.ev-res  { color: #aaaaaa; }
.ev-res.fail { color: #cc5555; }

#stats-content, #settings-content {
  display: none;
  flex: 1;
  overflow: hidden;
}
#stats-content.active, #settings-content.active { display: flex; }

#stats-iframe, #settings-iframe {
  flex: 1;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── info bar ── */
#info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 8px;
  background: #151825;
  border-top: 1px solid #2a2d40;
  flex-shrink: 0;
  font-size: 12px;
}
#suggestion  { color: #ffd81a; font-weight: bold; }
#chunk-label { color: #666; }

/* ── midi panel ── */
#midi-panel {
  display: flex;
  align-items: center;
  padding: 2px 8px;
  font-size: 11px;
  color: #666;
  background: #151825;
  border-top: 1px solid #2a2d40;
  flex-shrink: 0;
}
#synth-ctrl {
  margin-left: auto;
}
#midi-panel select {
  background: #1e2030;
  color: #aaa;
  border: 1px solid #3a3d55;
  font-size: 11px;
  margin-left: 4px;
  padding: 1px 3px;
}
</style>
</head>
<body>

<div id="toolbar">
  <!-- Mastery bar -->
  <div class="bar-wrap">
    <span id="m-label" class="bar-label">M 0.0</span>
    <div class="bar-track" title="Mastery">
      <div id="m-fill" class="bar-fill" style="width:0%; --color:#cc8022"></div>
      <span class="bar-track-label" id="m-track-lbl"></span>
    </div>
  </div>
  <!-- Power bar -->
  <div class="bar-wrap">
    <span id="p-label" class="bar-label">P 0.0</span>
    <div class="bar-track" title="Power">
      <div id="p-fill" class="bar-fill" style="width:0%; --color:#cc8022"></div>
      <span class="bar-track-label" id="p-track-lbl"></span>
    </div>
  </div>
  <!-- Daily points bar -->
  <div class="bar-wrap">
    <span id="d-label" class="bar-label">0 pts</span>
    <div class="bar-track" title="Daily goal">
      <div id="d-fill" class="bar-fill" style="width:0%; --color:#3366cc"></div>
      <span class="bar-track-label" id="d-track-lbl"></span>
    </div>
  </div>

  <span id="streak-text"></span>

  <div id="controls">
    <div id="bpm-ctrl">
      <button onclick="adjustBpm(-10)">−−</button>
      <input id="bpm-val" type="number" min="1" max="999" value="120"
             onchange="setBpm(this.value)" title="BPM">
      <button onclick="adjustBpm(10)">++</button>
    </div>
    <button id="karaoke-btn" onclick="toggleKaraoke()">[K]araoke</button>
    <button onclick="reloadLesson()">[R]eload</button>
    <button id="stats-btn"    onclick="showStats()">[S]tats</button>
    <button id="events-btn"   onclick="showEvents()">[E]vents</button>
    <button id="settings-btn" onclick="showSettings()">Se[t]tings</button>
    <button onclick="quitLesson()">X</button>
  </div>
</div>

<div id="workspace">
  <div id="left-pane">
    <div id="score-wrap">
      <img id="score-img" alt="score">
      <div id="celebration"></div>
    </div>
    <div id="squares"></div>
    <div id="explanations"></div>
  </div>

  <div id="divider"></div>

  <div id="right-pane">
    <div id="right-tab-bar"></div>
    <div id="events-content">
      <div id="events-log"></div>
    </div>
    <div id="stats-content">
      <iframe id="stats-iframe"></iframe>
    </div>
    <div id="settings-content">
      <iframe id="settings-iframe"></iframe>
    </div>
  </div>
</div>

<div id="info-bar">
  <span id="suggestion"></span>
  <span id="chunk-label"></span>
</div>

<div id="midi-panel">
  MIDI
  <button onclick="midi.init()" title="Request MIDI permission">⟳</button>
  in <select id="midi-in"  onchange="selectMidiIn(this.value)"><option value="">—</option></select>
  out <select id="midi-out" onchange="selectMidiOut(this.value)"><option value="">—</option></select>
  <label><input type="checkbox" id="midi-forward" onchange="setForward(this.checked)"> forward</label>
  <span id="synth-ctrl">synth <input type="range" id="synth-vol" min="0" max="1" step="0.01" value="0"
    oninput="setSynthVolume(this.value)" title="Synth volume (0 = off)"></span>
</div>

<script src="chunks.js"></script>
<script src="rules.js"></script>
<script src="midi.js"></script>
<script src="karaoke.js"></script>
<script src="synth.js"></script>
<script src="all.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>

</body>
</html>
