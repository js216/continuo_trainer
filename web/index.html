<!DOCTYPE html>

<!-- Copyright (c) 2026 Jakob Kastelic -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continuo Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="app">

<div id="toolbar">
  <button onclick="reloadLesson()">[R]eload</button>
  <!-- Mastery bar -->
  <div class="bar-wrap">
    <span id="m-label" class="bar-label">M 0.0</span>
    <div class="bar-track" title="Mastery">
      <div id="m-fill" class="bar-fill" style="width:0%; --color:#cc8022"></div>
      <span class="bar-track-label" id="m-track-lbl"></span>
    </div>
  </div>
  <!-- Power bar -->
  <div class="bar-wrap">
    <span id="p-label" class="bar-label">P 0.0</span>
    <div class="bar-track" title="Power">
      <div id="p-fill" class="bar-fill" style="width:0%; --color:#cc8022"></div>
      <span class="bar-track-label" id="p-track-lbl"></span>
    </div>
  </div>
  <!-- Daily points bar -->
  <div class="bar-wrap">
    <span id="d-label" class="bar-label">0 pts</span>
    <div class="bar-track" title="Daily goal">
      <div id="d-fill" class="bar-fill" style="width:0%; --color:#3366cc"></div>
      <span class="bar-track-label" id="d-track-lbl"></span>
    </div>
  </div>

  <span id="streak-text"></span>

  <div id="controls">
    <button id="stats-btn"    onclick="showStats()">[L]essons</button>
    <button id="events-btn"   onclick="showEvents()">[E]vents</button>
    <button id="settings-btn"  onclick="showSettings()">[S]ettings</button>
    <button id="keyboard-btn"  onclick="toggleKeyboard()">Keyboard</button>

    <span id="username" class="username"></span>
  </div>
</div>

<div id="workspace">
  <div id="left-pane">
    <div id="score-wrap">
      <div id="score-bg"><img id="score-img" alt="score"></div>
      <div id="celebration"></div>
    </div>
    <div id="squares"></div>
    <div id="explanations"></div>
  </div>

  <div id="divider"></div>

  <div id="right-pane">
    <div id="right-tab-bar"></div>
    <div id="events-content">
      <div id="events-log"></div>
    </div>
    <div id="stats-content">
      <iframe id="stats-iframe"></iframe>
    </div>
    <div id="settings-content">
      <iframe id="settings-iframe"></iframe>
    </div>
  </div>
</div>

<div id="info-bar">
  <span id="suggestion"></span>
  <span id="chunk-label"></span>
</div>

<div id="midi-panel">
  MIDI
  <button onclick="midi.init()" title="Request MIDI permission">⟳</button>
  in <select id="midi-in"  onchange="selectMidiIn(this.value)"><option value="">—</option></select>
  out <select id="midi-out" onchange="selectMidiOut(this.value)"><option value="">—</option></select>
  <label><input type="checkbox" id="midi-forward" onchange="setForward(this.checked)"> forward</label>
  <span id="synth-ctrl">synth <input type="range" id="synth-vol" min="0" max="1" step="0.01" value="0"
    oninput="setSynthVolume(this.value)" title="Synth volume (0 = off)"></span>
  <span id="bpm-ctrl">
    <button onclick="adjustBpm(-10)">−−</button>
    <input id="bpm-val" type="number" min="1" max="999" value="120"
           onchange="setBpm(this.value)" title="BPM">
    <button onclick="adjustBpm(10)">++</button>
  </span>
  <button id="karaoke-btn" onclick="toggleKaraoke()">[K]araoke</button>
</div>

<div id="keyboard-panel"></div>

<script src="chunks.js"></script>
<script src="rules.js"></script>
<script src="midi.js"></script>
<script src="karaoke.js"></script>
<script src="synth.js"></script>
<script src="keyboard.js"></script>
<script src="all.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>

</body>
</html>
